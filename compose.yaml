# Shared config for every sandbox service. Both services are identical except
# for their build/image; keep the mounts, firewall caps, and env in one place.
x-agent-common: &agent-common
  working_dir: /workspace
  volumes:
    - ${PROJECT_DIR:?set PROJECT_DIR to the specific project directory to mount}:/workspace
    - ${AGENT_HOME:?set AGENT_HOME to the dedicated sandbox home directory}:/home/developer
  # Required for the entrypoint to configure the egress firewall (iptables/ipset).
  cap_add:
    - NET_ADMIN
    - NET_RAW
  # Block setuid-based privilege escalation. Does NOT affect the root->developer
  # gosu drop in the entrypoint (dropping privileges is always permitted).
  security_opt:
    - no-new-privileges:true
  # Keep a runaway/compromised agent from exhausting the Docker VM (~62 GB here).
  # mem_limit is overridable via MEM_LIMIT in .env; raise it toward ~56g for
  # memory-hungry M2 tests, but stay under the VM total. pids_limit is a
  # fork-bomb ceiling, well above what a high -j M2 build/check needs.
  mem_limit: ${MEM_LIMIT:-48g}
  pids_limit: 1024
  environment:
    SANDBOX_FIREWALL: ${SANDBOX_FIREWALL:-1}
    ALLOWLIST_EXTRA: ${ALLOWLIST_EXTRA:-}
    # Reach the host/LAN /24 from the container? Default off for tighter
    # isolation; not needed for normal work (Docker embedded DNS is separate).
    ALLOW_HOST_NETWORK: ${ALLOW_HOST_NETWORK:-0}
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  stdin_open: true
  tty: true

services:
  base:
    <<: *agent-common
    build:
      context: .
      dockerfile: docker/Dockerfile.base
      args:
        UID: ${UID}
        GID: ${GID}
    image: m2-agent-base

  m2:
    <<: *agent-common
    build:
      context: .
      dockerfile: docker/Dockerfile.m2
    image: m2-agent-m2
